app-id: org.deskflow.deskflow
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: deskflow
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
cleanup:
  - /include
  - '*.a'
  - /bin/ei-debug-events
  - /lib/cmake
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/cmake
  - /share/doc
  - /share/gir-1.0
  - /lib/girepository-1.0
modules:
  - name: python3-Jinja2
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} --no-build-isolation Jinja2
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/62/a1/3d680cbfd5f4b8f15abc1d571870c5fc3e594bb582bc3b64ea099db13e56/jinja2-3.1.6-py3-none-any.whl
        sha256: 85ece4451f492d0c13c5dd7c13a64681a86afae63a5f347908daf103ce6d2f67
        x-checker-data:
          type: pypi
          name: Jinja2
          packagetype: bdist_wheel
    cleanup:
      - '*'
  - name: libei
    buildsystem: meson
    config-opts:
      - -Ddocumentation=[]
      - -Dtests=disabled
      - -Dliboeffis=disabled
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/libinput/libei
        tag: 1.6.0
        commit: 8a46bf3d4b6af7f25a61be53386cf618218114ef
        x-checker-data:
          type: git
          tag-pattern: ^([\\d.]+)$
  - name: libportal
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dtests=false
      - -Dportal-tests=false
      - -Dvapi=false
      - -Dbackend-qt6=auto
    sources:
      - type: archive
        url: https://github.com/flatpak/libportal/archive/0.10.0.tar.gz
        sha256: e1b6913c6d9015bfa918ace86f82c30940982add97aed9c18cc929c5327054fd
        x-checker-data:
          type: anitya
          project-id: 230124
          stable-only: true
          url-template: https://github.com/flatpak/libportal/archive/$version.tar.gz
  - name: gtest
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/google/googletest.git
        tag: v1.17.0
        commit: 52eb8108c5bdec04579160ae17225d66034bd723
        x-checker-data:
          type: git
          tag-pattern: ^([\\d.]+)$
    cleanup:
      - '*'
  - name: deskflow
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        disable-shallow-clone: true
        url: https://github.com/deskflow/deskflow.git
        tag: v1.26.0
        commit: 760e3b99b00053647a96b405276bf614bd860075
        x-checker-data:
          type: git
          tag-pattern: ^v([\\d.]+)$
